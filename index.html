<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Oumix Marrakech — Elite Fleet & Luxury Villas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Italiana&family=Outfit:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B0B0C;
    --bg-2: #0F0F11;
    --bg-3: #141416;
    --line: rgba(255,255,255,0.06);
    --line-2: rgba(255,255,255,0.10);
    --text: #F4F2EE;
    --muted: #8C8A86;
    --muted-2: #5C5A56;
    --gold: #E6C687;
    --gold-2: #C9A86A;
    --gold-3: #8A6F3F;
    --warm: #2B1E14;
    --car-tint: 220 30% 8%;
    --lux-tint: 28 35% 10%;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Outfit', system-ui, sans-serif; font-weight: 300; -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; overflow-x: hidden; }
  .display { font-family: 'Italiana', 'Cormorant Garamond', serif; font-weight: 400; letter-spacing: 0.02em; }
  .script { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 400; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .gold { color: var(--gold); }
  .uppercase-wide { text-transform: uppercase; letter-spacing: 0.22em; font-size: 11px; }
  .hairline { height: 1px; background: linear-gradient(90deg, transparent, var(--gold-3), transparent); opacity: 0.5; }
  ::selection { background: var(--gold); color: #000; }
  /* placeholder image strip — for swap-in real photography */
  .img-slot {
    position: relative;
    overflow: hidden;
    background:
      repeating-linear-gradient(135deg, rgba(230,198,135,0.04) 0 2px, transparent 2px 14px),
      linear-gradient(180deg, #1a1612 0%, #0d0b09 100%);
    border: 1px solid var(--line);
  }
  .img-slot[data-tone="car"] {
    background:
      repeating-linear-gradient(135deg, rgba(255,255,255,0.02) 0 2px, transparent 2px 14px),
      linear-gradient(180deg, #14171c 0%, #07080a 100%);
  }
  .img-slot::after {
    content: attr(data-label);
    position: absolute; inset: auto 0 12px 0;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.18em;
    color: rgba(230,198,135,0.55);
    text-transform: uppercase;
  }
  .gold-border { border: 1px solid rgba(230,198,135,0.25); }
  button { font-family: inherit; cursor: pointer; }
  a { color: inherit; text-decoration: none; }
  /* scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold-3); }
  /* fade in */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
  .fade-up { animation: fadeUp 0.7s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .fade { animation: fade 0.5s ease both; }
  /* shimmer for gold text on hero */
  @keyframes shimmer { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
  .gold-shimmer {
    background: linear-gradient(110deg, #8a6f3f 0%, #E6C687 25%, #fff3d4 45%, #E6C687 65%, #8a6f3f 100%);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shimmer 6s ease-in-out infinite;
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script src="image-slot.js"></script>
  <script type="text/babel" src="src/data.jsx"></script>
  <script type="text/babel" src="src/shared.jsx"></script>
  <script type="text/babel" src="src/landing.jsx"></script>
  <script type="text/babel" src="src/catalog.jsx"></script>
  <script type="text/babel" src="src/detail.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
